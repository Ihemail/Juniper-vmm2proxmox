
#include "/vmm/bin/common.defs"
#include "/vmm/data/user_disks/vmxc/common.vmx.p3.defs"

// -- Image: Linux/CentOS/Ubuntu/Windows - without CDROM
#define CENTOS7_base basedisk "/vmm/data/user_disks/test/centos7-300g.vmdk";


config "VMM_Sample_Topology" {

// ----- Linux Server/Windows nodes [CentOS/Ubuntu/Redhat/WINDOWS]
//-------------------------------------------------------------------------

  vm "vm_centos_1" {
    hostname "vm_centos_1";
    CENTOS7_base
    ncpus 4;
    memory 256;
    setvar "boot_noveriexec" "yes";
    interface "em0" { bridge "ext"; };
    interface "em1" { bridge "NETBR_1"; };
    interface "em2" { bridge "NETBR_2"; };
    interface "em3" { bridge "NETBR_3"; };
  };

  
//## PRIVATE_BRIDGES ##//

  bridge "NETBR_1" {};
  bridge "NETBR_2" {};
  bridge "NETBR_3" {};
  bridge "NETBR_4" {};
  bridge "NETBR_5" {};
  bridge "NETBR_6" {};
  bridge "ext_gw" {};
  bridge "ext" {};
PRIVATE_BRIDGES
};


