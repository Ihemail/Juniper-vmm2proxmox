
#include "/vmm/bin/common.defs"
#include "/vmm/data/user_disks/vmxc/common.vmx.p3.defs"

// -- Image: vQFX10k
#define VQFX10_DISK  basedisk  "/vmm/data/user_disks/test/vqfxre-20.2R2.qcow2";
#define COSIM_DISK basedisk "/vmm/data/user_disks/test/vqfxpfe-20.2R2.qcow2";


config "VMM_Sample_Topology" {

// ----- vQFX nodes [vQFX10k]
//-------------------------------------------------------------------------

vm "pecosim-1" {
        hostname "pecosim-1"; 
        COSIM_DISK
        memory 4096;
        ncpus 2;
        interface "em0" { EXTERNAL; };
        interface "em1" { bridge "pecosim_bridge_1"; ipaddr "169.254.0.1"; };
    };
 
vm "vqfx10k-1" {
        hostname "vqfx1";
        VQFX10_DISK
        //setvar "simulation" "VELIT";
        setvar "qemu_args" "-smbios type=1,product=VELIT";
        VQFX_SYSTEST_CONFIG
        setvar "boot_noveriexec" "YES";
        interface "em0" { EXTERNAL; };
        interface "em1" { bridge "pecosim_bridge_1"; ipaddr "169.254.0.2"; };
        interface "em3" { bridge "NETBR_1";}; //xe-0/0/0
        interface "em4" { bridge "NETBR_2";}; //xe-0/0/1
        interface "em5" { bridge "NETBR_3";}; //xe-0/0/2
        interface "em6" { bridge "NETBR_4";}; //xe-0/0/3
    }; 

  
//## PRIVATE_BRIDGES ##//

  bridge "NETBR_1" {};
  bridge "NETBR_2" {};
  bridge "NETBR_3" {};
  bridge "NETBR_4" {};
  bridge "NETBR_5" {};
  bridge "NETBR_6" {};
  bridge "ext_gw" {};
  bridge "ext" {};
PRIVATE_BRIDGES
};


