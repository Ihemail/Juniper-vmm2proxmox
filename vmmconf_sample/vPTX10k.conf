#define EVOVPTX_FPC_CSPP_IMG "/vmm/data/base_disks/junos/vevo/ubuntu_vm_evo.qcow2"
#define VMM_ENV_CSPP_CFG_DIR /vmm/data/user_disks/evo_test/EVOvSCAPA/        // Do NOT enclose on quotes!


config "VMM_Sample_Topology" {

// ----- vBrackla nodes (vPTX10K-type1)
//-------------------------------------------------------------------------  
#undef  PTX_CHAS_NAME
#define PTX_CHAS_NAME vPTX10K-1
//#undef EVOvBrackla_RE_MEMORY
//#define EVOvBrackla_RE_MEMORY 8192
    EVOVPTX_CHASSIS_START_ (PTX_CHAS_NAME)
        EVOvBracklaRE(PTX_CHAS_NAME,EVOVPTX_DISK1)
        EVOvBrackla_CSPP_START(PTX_CHAS_NAME,EVOVPTX_FPC_CSPP_IMG)
            EVOVPTX_CONNECT(IF_ET(0, 0, 0), NETBR_1)
            EVOVPTX_CONNECT(IF_ET(0, 0, 1), NETBR_2)
            EVOVPTX_CONNECT(IF_ET(0, 0, 2), NETBR_3)
            EVOVPTX_CONNECT(IF_ET(0, 0, 3), NETBR_4)
            EVOVPTX_CONNECT(IF_ET(0, 0, 4), NETBR_5)
        EVOvBrackla_CSPP_END
    EVOVPTX_CHASSIS_END_

// ----- vArdbeg nodes (vPTX10K-type2)
//-------------------------------------------------------------------------  
#undef    PTX_CHAS_NAME
#undef    EVOvArdbeg_RE_MEMORY
#define PTX_CHAS_NAME  vPTX10K_1A
#define EVOvArdbeg_RE_MEMORY 8192
    EVOVPTX_CHASSIS_START_ (PTX_CHAS_NAME)
        EVOvArdbegRE(PTX_CHAS_NAME,EVOVPTX_DISK1)
        EVOvArdbeg_CSPP_START(PTX_CHAS_NAME,EVOVPTX_FPC_CSPP_IMG)
            // To Network Bridge: NETBR_1
            EVOVPTX_CONNECT(IF_ET (0, 0, 0), NETBR_1)
            // To Network Bridge: NETBR_2
            EVOVPTX_CONNECT(IF_ET (0, 0, 1), NETBR_2)
            // To Network Bridge: NETBR_3
            EVOVPTX_CONNECT(IF_ET (0, 0, 2), NETBR_3)
            // To Network Bridge: NETBR_4
            EVOVPTX_CONNECT(IF_ET (0, 0, 3), NETBR_4)
            // To Network Bridge: NETBR_5
            EVOVPTX_CONNECT(IF_ET (0, 0, 4), NETBR_5)
        EVOvArdbeg_CSPP_END
    EVOVPTX_CHASSIS_END_ 

  
//## PRIVATE_BRIDGES ##//

  bridge "NETBR_1" {};
  bridge "NETBR_2" {};
  bridge "NETBR_3" {};
  bridge "NETBR_4" {};
  bridge "NETBR_5" {};
  bridge "NETBR_6" {};
  bridge "ext_gw" {};
  bridge "ext" {};
PRIVATE_BRIDGES
};


