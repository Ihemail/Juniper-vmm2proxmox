
behavior:
  interactive: true
  unknown_action: skip
  ask_once_per_token: true
  vmid_start: 6000
  storage_id: data
  iso_storage_id: local
  iso_storage_path: /var/lib/vz/template/iso
  disk_bus: ide
  boot_initially: false
  serial0_always: true
  mac_prefix: BC:24:22
  bridge_style: vmc_truncated6
  image_dir: /root/import
  vlan_policy:
    base: 1010
    step: 10
    order: [vmx, vqfx, vptx, vsrx]
  vptx_cspp_mode: single

tokens:
  CENTOS7_base: linux
  LUBUNTU_base: linux
  OPENWRT_base: modem
  VMX_DISK: vmx
  VQFX10_DISK: vqfx
  COSIM_DISK: vqfx-pfe
  VSRX_DISK: vsrx
  WINDOWS10_base: linux

types:
  linux:
    machine: q35
    cores: 1
    memory_mb: 1024
    nic_model: virtio
  modem:
    machine: q35
    cores: 1
    memory_mb: 128
    nic_model: virtio
  vmx:
    machine: pc-i440fx-7.0
    bridges: { mgmt: vmbr_mgmt, fpc: vmbr6_fpc }
    re:
      cores: 1
      memory_mb: 1230
      nic_model: e1000
      extra_disk_ide1: /root/import/vmxhdd_300m.qcow2
      conf_args: "-machine accel=kvm:tcg -smbios type=1,product=VM-<VMID>-48-re-0 -cpu 'host,kvm=on'"
      scsihw: virtio-scsi-pci
    mpc:
      cores: 3
      memory_mb: 2250
      nic_model: virtio
      ge_net_offset: 2
      conf_args: "-machine accel=kvm:tcg -smbios type=1,product=VM-<RE-VMID>-48-mpc-0 -cpu host"
  vqfx:
    machine: pc-i440fx-7.0
    bridges: { mgmt: vmbr_mgmt, fpc: vmbr6_fpc }
    re:
      cores: 1
      memory_mb: 1200
      nic_model: e1000
      ge_net_offset: 2
      conf_args: "-machine accel=kvm:tcg -smbios 'type=1,product=QFX10K-11' -cpu host"
    pfe:
      cores: 1
      memory_mb: 1024
      nic_model: e1000
      conf_args: "-machine accel=kvm:tcg -cpu host"
  vsrx:
    machine: pc-i440fx-7.0
    bridges: { mgmt: vmbr_mgmt, fpc: vmbr6_fpc }
    re:
      cores: 2
      memory_mb: 4096
      nic_model: e1000
      ge_net_offset: 2
      conf_args: "-machine accel=kvm:tcg -cpu host"
  vptx:
    machine: pc-i440fx-7.0
    bridges: { mgmt: vmbr_mgmt, fpc: vmbr6_fpc }
    re:
      cores: 4
      memory_mb: 4096
      nic_model: virtio
      extra_disk_ide0: /root/import/vptxhdd.qcow2
      boot_order_after_attach: "order=ide0;ide2"
      conf_args: "-machine accel=kvm:tcg -smbios 'type=0,vendor=Bochs,version=Bochs' -smbios 'type=3,manufacturer=Bochs' -smbios 'type=1,manufacturer=Bochs,product=Bochs,serial=chassis_no=0:slot=0:type=1:assembly_id=0x0CDC:platform=220:master=0' -cpu host"
      scsihw: virtio-scsi-pci
      fixed_nics:
        - { net: 0, bridge: vmbr_mgmt}
        - { net: 1, bridge: vmbr6_fpc, vlan: base }
        - { net: 2, bridge: vmbr6_fpc, vlan: base_plus_1 }
        - { net: 3, bridge: vmbr6_fpc, vlan: base_plus_1 }
        - { net: 4, bridge: vmbr_mgmt }
    cspp:
      cores: 3
      memory_mb: 3280
      boot_order_after_attach: "order=ide0"
      conf_args: "-machine accel=kvm:tcg -smbios 'type=1,product=0,serial=/slotid=1/assembly=0/pic=0@0' -cpu host"
      fixed_nics:
        - { net: 0, model: virtio, bridge: vmbr_mgmt }
        - { net: 1, model: virtio, bridge: vmbr6_fpc, vlan: base }
        - { net: 2, model: virtio, bridge: vmbr6_fpc, vlan: base_plus_1 }
        - { net: 3, model: virtio, bridge: vmbr6_fpc, vlan: base_plus_1 }
      if_ports: { start_net: 4, model: e1000, net_offset: 4 }


